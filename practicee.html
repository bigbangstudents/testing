<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Easter Bunny Egg Catch RPG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', sans-serif;
    background: #e3f2fd;
    text-align: center;
    touch-action: none;
}
h1 { margin: 6px 0; font-size: 1.4rem; }

canvas {
    width: 100%;
    max-width: 420px;
    border: 3px solid #4caf50;
    border-radius: 14px;
    background: #bbdefb;
    display: block;
    margin: 0 auto;
}

#ui {
    max-width: 420px;
    margin: 4px auto;
    font-size: 0.9rem;
}

#progressContainer {
    width: 85%;
    height: 10px;
    background: #c8e6c9;
    border-radius: 10px;
    margin: 4px auto;
}
#progressBar {
    height: 100%;
    background: #66bb6a;
    border-radius: 10px;
}

.controlRow {
    max-width: 420px;
    margin: 8px auto;
    display: flex;
    gap: 6px;
}

button {
    flex: 1;
    font-size: 0.95rem;
    padding: 10px 0;
    border-radius: 12px;
    border: none;
    background: #ffb74d;
    color: #4e342e;
}
button:disabled {
    background: #e0e0e0;
    color: #9e9e9e;
}

#menu {
    max-width: 420px;
    margin: 32px auto;
}
#menu button {
    width: 75%;
    margin-top: 14px;
    font-size: 1.2rem;
}
</style>
</head>

<body>

<h1>🐰 Easter Bunny Egg Catch RPG 🥚</h1>

<div id="menu">
    <p id="menuText">Help the bunny catch eggs 🥚</p>
    <button id="playBtn">▶ PLAY</button>
</div>

<canvas id="gameCanvas" width="420" height="520" style="display:none"></canvas>

<div id="ui" style="display:none">
    ⏱ <span id="time">30</span>s |
    ⭐ <span id="score">0</span> |
    🎮 Level <span id="level">1</span>
    <div id="goal"></div>
</div>

<div id="progressContainer" style="display:none">
    <div id="progressBar"></div>
</div>

<div class="controlRow" style="display:none">
    <button id="magnetBtn" disabled>🧲</button>
    <button id="leftBtn">⬅</button>
    <button id="rightBtn">➡</button>
    <button id="slowBtn" disabled>🕒</button>
</div>

<script>
/* ================= DOM ================= */
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const menu = document.getElementById("menu");
const menuText = document.getElementById("menuText");
const playBtn = document.getElementById("playBtn");

const ui = document.getElementById("ui");
const progressContainer = document.getElementById("progressContainer");
const controls = document.querySelector(".controlRow");

const scoreEl = document.getElementById("score");
const levelEl = document.getElementById("level");
const timeEl = document.getElementById("time");
const goalEl = document.getElementById("goal");
const progressBar = document.getElementById("progressBar");

const leftBtn = document.getElementById("leftBtn");
const rightBtn = document.getElementById("rightBtn");
const magnetBtn = document.getElementById("magnetBtn");
const slowBtn = document.getElementById("slowBtn");

/* ================= GAME STATE ================= */
let gameState = "menu";
let bunny, eggs, floatingTexts;
let level = 1;
let score = 0;
let timeLeft = 30;
let paused = false;
let transitioning = false;
let overlayText = "";

let timer = null;
let eggSpawn = null;
let bounce = 0;

/* powerups */
let magnetActive = false;
let slowActive = false;
let magnetCooldown = false;
let slowCooldown = false;

const goals = {1:10, 2:18, 3:25};
const speeds = {1:2.1, 2:3.0, 3:3.8};

/* ================= UI ================= */
function updateUI() {
    scoreEl.textContent = score;
    levelEl.textContent = level;
    timeEl.textContent = timeLeft;
    goalEl.textContent = `Goal: ${goals[level]} points`;
    progressBar.style.width = Math.min(100, score / goals[level] * 100) + "%";
}

/* ================= MENU ================= */
playBtn.onclick = () => {
    level = 1;
    startGame();
};

function showMenu(type="start") {
    gameState = "menu";
    clearInterval(timer);
    clearInterval(eggSpawn);

    menu.style.display = "block";
    canvas.style.display = "none";
    ui.style.display = "none";
    progressContainer.style.display = "none";
    controls.style.display = "none";

    if (type === "win") {
        menuText.textContent = "🎉 YOU WIN! The bunny is proud of you 🐰";
        playBtn.textContent = "▶ PLAY AGAIN";
    } else if (type === "lose") {
        menuText.textContent = "💔 GAME OVER — Try again!";
        playBtn.textContent = "▶ PLAY AGAIN";
    } else {
        menuText.textContent = "Help the bunny catch eggs 🥚";
        playBtn.textContent = "▶ PLAY";
    }
}

/* ================= GAME FLOW ================= */
function startGame() {
    gameState = "playing";
    menu.style.display = "none";
    canvas.style.display = "block";
    ui.style.display = "block";
    progressContainer.style.display = "block";
    controls.style.display = "flex";
    startLevel();
}

function startLevel() {
    transitioning = false;
    paused = false;
    overlayText = "";

    score = 0;
    timeLeft = 30;
    eggs = [];
    floatingTexts = [];
    bunny = { x: canvas.width/2 - 30, y: canvas.height - 130, width: 60 };

    magnetActive = slowActive = false;
    magnetCooldown = slowCooldown = false;

    magnetBtn.disabled = level < 2;
    slowBtn.disabled = level !== 3;

    updateUI();
    startTimer();
    startEggs();
}

/* ================= TIMER ================= */
function startTimer() {
    clearInterval(timer);
    timer = setInterval(() => {
        if (!paused && gameState === "playing") {
            timeLeft--;
            updateUI();
            if (timeLeft <= 0) loseGame();
        }
    }, 1000);
}

/* ================= EGGS ================= */
function startEggs() {
    clearInterval(eggSpawn);
    eggSpawn = setInterval(() => {
        if (!paused) spawnEgg();
    }, 900);
}

function spawnEgg() {
    let type = "normal";
    if (level >= 2 && Math.random() < 0.25) type = "red";
    if (level === 3 && Math.random() < 0.15) type = "gold";
    eggs.push({ x: Math.random()*(canvas.width-40)+20, y: -20, type });
}

function updateEggs() {
    eggs.forEach(e => {
        e.y += speeds[level] * (slowActive ? 0.5 : 1);
        if (magnetActive) e.x += (bunny.x + 30 - e.x) * 0.08;
    });

    eggs = eggs.filter(e => {
        if (!transitioning &&
            e.y > bunny.y &&
            e.x > bunny.x &&
            e.x < bunny.x + bunny.width) {

            const delta = e.type==="gold"?5:e.type==="red"?-10:1;
            score = Math.max(0, score + delta);
            addFloatingText(delta);
            updateUI();

            if (score >= goals[level]) nextLevel();
            return false;
        }
        return e.y < canvas.height;
    });
}

/* ================= LEVEL FLOW ================= */
function nextLevel() {
    if (transitioning) return;
    transitioning = true;
    paused = true;
    overlayText = "NEXT LEVEL";

    clearInterval(timer);
    clearInterval(eggSpawn);

    setTimeout(() => {
        if (level === 3) {
            overlayText = "YOU WIN!";
            setTimeout(() => showMenu("win"), 1200);
        } else {
            level++;
            startLevel();
        }
    }, 1500);
}

function loseGame() {
    if (transitioning) return;
    transitioning = true;
    paused = true;
    overlayText = "GAME OVER";

    clearInterval(timer);
    clearInterval(eggSpawn);
    setTimeout(() => showMenu("lose"), 1500);
}

/* ================= POWERUPS ================= */
magnetBtn.onclick = () => {
    if (magnetCooldown || paused || level < 2) return;
    magnetActive = true;
    magnetCooldown = true;
    magnetBtn.disabled = true;

    setTimeout(() => magnetActive = false, 5000);
    setTimeout(() => {
        magnetCooldown = false;
        magnetBtn.disabled = false;
    }, 8000);
};

slowBtn.onclick = () => {
    if (slowCooldown || paused || level !== 3) return;
    slowActive = true;
    slowCooldown = true;
    slowBtn.disabled = true;

    setTimeout(() => slowActive = false, 4000);
    setTimeout(() => {
        slowCooldown = false;
        slowBtn.disabled = false;
    }, 12000);
};

/* ================= FLOATING TEXT ================= */
function addFloatingText(v){
    floatingTexts.push({
        x: bunny.x + bunny.width/2,
        y: bunny.y - 10,
        text: v>0?`+${v}`:`${v}`,
        life: 40
    });
}

function drawFloatingTexts(){
    floatingTexts.forEach(f=>{
        ctx.globalAlpha = f.life/40;
        ctx.fillStyle = f.text.startsWith("+") ? "#2e7d32" : "#c62828";
        ctx.font = "bold 16px Comic Sans MS";
        ctx.textAlign = "center";
        ctx.fillText(f.text, f.x, f.y);
        ctx.globalAlpha = 1;
        f.y--; f.life--;
    });
    floatingTexts = floatingTexts.filter(f=>f.life>0);
}

/* ================= DRAW ================= */
function drawBackground(){
    ctx.fillStyle="#bbdefb";
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

/* bunny unchanged */
function drawBunny(){
    bounce += 0.1;
    const bob = Math.sin(bounce)*2;
    const cx = bunny.x + 30;
    const cy = bunny.y + 40 + bob;

    ctx.fillStyle="#d7b899";
    ctx.beginPath();
    ctx.ellipse(cx-12,cy-50,6,22,0,0,Math.PI*2);
    ctx.ellipse(cx+12,cy-50,6,22,0,0,Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.ellipse(cx,cy,24,30,0,0,Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.ellipse(cx,cy-30,20,18,0,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="#000";
    ctx.beginPath();
    ctx.arc(cx-6,cy-32,2,0,Math.PI*2);
    ctx.arc(cx+6,cy-32,2,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="#f48fb1";
    ctx.beginPath();
    ctx.arc(cx,cy-26,2,0,Math.PI*2);
    ctx.fill();
}

function drawEgg(e){
    ctx.beginPath();
    ctx.ellipse(e.x,e.y,10,15,0,0,Math.PI*2);
    ctx.fillStyle =
        e.type==="gold"?"#ffeb3b":
        e.type==="red"?"#e53935":
        "#f8bbd0";
    ctx.fill();
}

/* ================= OVERLAY ================= */
function drawOverlay(){
    if (!overlayText) return;
    ctx.fillStyle="rgba(0,0,0,0.6)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#fff";
    ctx.font="bold 32px Comic Sans MS";
    ctx.textAlign="center";
    ctx.fillText(overlayText, canvas.width/2, canvas.height/2);
    ctx.textAlign="left";
}

/* ================= CONTROLS ================= */
document.addEventListener("keydown", e=>{
    if (paused) return;
    if (e.key==="ArrowLeft") bunny.x=Math.max(0,bunny.x-24);
    if (e.key==="ArrowRight") bunny.x=Math.min(canvas.width-bunny.width,bunny.x+24);
});

leftBtn.onclick=()=>bunny.x=Math.max(0,bunny.x-24);
rightBtn.onclick=()=>bunny.x=Math.min(canvas.width-bunny.width,bunny.x+24);

/* ================= LOOP ================= */
function loop(){
    if (gameState==="playing"){
        drawBackground();
        drawBunny();
        eggs.forEach(drawEgg);
        updateEggs();
        drawFloatingTexts();
        drawOverlay();
    }
    requestAnimationFrame(loop);
}

showMenu("start");
loop();
</script>

</body>
</html>
